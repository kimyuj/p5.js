<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✿ p5.js 작품 모음</title>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Gaegu:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pink:    #FFD6E0;
      --mint:    #C8F0E4;
      --yellow:  #FFF3C8;
      --lavender:#E8DCFF;
      --blue:    #C8E8FF;
      --peach:   #FFE5CC;
      --text:    #5a4a6a;
      --muted:   #9b8aab;
      --white:   #fffcff;
      --shadow:  0 6px 24px rgba(160,120,200,0.12);
      --radius:  20px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Gowun Dodum', sans-serif;
      background: linear-gradient(135deg, #fdf6ff 0%, #f0f8ff 50%, #fff8f0 100%);
      min-height: 100vh;
      color: var(--text);
      overflow-x: hidden;
    }

    /* Floating deco blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }
    body::before {
      width: 480px; height: 480px;
      background: radial-gradient(circle, #ffd6e0 0%, transparent 70%);
      top: -120px; left: -120px;
      animation: float1 8s ease-in-out infinite;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #c8e8ff 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation: float2 10s ease-in-out infinite;
    }

    @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-30px)} }

    /* Header */
    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 64px 24px 40px;
    }

    .badge {
      display: inline-block;
      background: var(--pink);
      color: #b05070;
      font-size: 12px;
      letter-spacing: 0.12em;
      padding: 5px 16px;
      border-radius: 999px;
      margin-bottom: 20px;
      border: 1.5px solid #f5b8cc;
      animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    h1 {
      font-family: 'Gaegu', cursive;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      animation: slideUp 0.7s ease both;
      animation-delay: 0.1s;
    }
    h1 span {
      background: linear-gradient(120deg, #c97ec0, #7eaec9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 12px;
      color: var(--muted);
      font-size: 15px;
      animation: slideUp 0.7s ease both;
      animation-delay: 0.2s;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 0 auto 48px;
      max-width: 400px;
      animation: fadeIn 1s ease both;
      animation-delay: 0.3s;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1.5px;
      background: linear-gradient(to right, transparent, #ddc8ef);
    }
    .divider::after {
      background: linear-gradient(to left, transparent, #ddc8ef);
    }
    .divider-icon { font-size: 18px; opacity: 0.7; }

    /* Grid */
    main {
      position: relative;
      z-index: 1;
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 28px 80px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }

    /* Card */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 2px solid transparent;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.3s ease, border-color 0.3s ease;
      animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .card:nth-child(1) { animation-delay: 0.35s; }
    .card:nth-child(2) { animation-delay: 0.45s; }
    .card:nth-child(3) { animation-delay: 0.55s; }
    .card:nth-child(4) { animation-delay: 0.65s; }

    .card:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow: 0 16px 48px rgba(160,120,200,0.2);
    }
    .card:nth-child(1):hover { border-color: #f5b8cc; }
    .card:nth-child(2):hover { border-color: #b8c8f5; }
    .card:nth-child(3):hover { border-color: #a8e0c8; }
    .card:nth-child(4):hover { border-color: #d4b8f5; }

    /* Card color bars */
    .card-bar {
      height: 6px;
    }
    .card:nth-child(1) .card-bar { background: linear-gradient(to right, #ffb3c8, #ffd6a0); }
    .card:nth-child(2) .card-bar { background: linear-gradient(to right, #a0c4ff, #c8b3ff); }
    .card:nth-child(3) .card-bar { background: linear-gradient(to right, #8de0c0, #b8f0a8); }
    .card:nth-child(4) .card-bar { background: linear-gradient(to right, #c4a0ff, #f0a0d8); }

    /* iframe preview */
    .card-preview {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 2;   /* 600:400 = 3:2 */
      overflow: hidden;
      background: #f8f4ff;
    }
    .card-preview iframe {
      position: absolute;
      top: 0; left: 0;
      width: 600px;
      height: 400px;
      border: none;
      transform-origin: top left;
      pointer-events: none;   /* 기본: 인터랙션 차단 (스크롤 방해 방지) */
    }

    /* 과제3 전용: 호버 시 인터랙션 활성화 */
    .card.interactive .card-preview iframe {
      pointer-events: none;   /* JS로 제어 */
    }

    /* 인터랙션 힌트 오버레이 */
    .interact-hint {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(200, 180, 240, 0.55);
      backdrop-filter: blur(2px);
      color: #5a3a8a;
      font-size: 13px;
      font-family: 'Gowun Dodum', sans-serif;
      letter-spacing: 0.05em;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.3s ease;
      border-radius: 0;
      gap: 6px;
    }
    .interact-hint span { font-size: 18px; }
    .card.interactive:hover .interact-hint {
      opacity: 0;
    }

    /* Card info */
    .card-info {
      padding: 18px 22px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-meta { display: flex; align-items: center; gap: 12px; }

    .card-num {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Gaegu', cursive;
      font-size: 15px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .card:nth-child(1) .card-num { background: var(--pink); color: #b05070; }
    .card:nth-child(2) .card-num { background: var(--blue); color: #3060a0; }
    .card:nth-child(3) .card-num { background: var(--mint); color: #207060; }
    .card:nth-child(4) .card-num { background: var(--lavender); color: #6040a0; }

    .card-text { display: flex; flex-direction: column; gap: 2px; }
    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }
    .card-tag {
      display: inline-block;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 999px;
    }
    .card:nth-child(1) .card-tag { background: #ffeef3; color: #c06880; }
    .card:nth-child(2) .card-tag { background: #eef3ff; color: #4868c0; }
    .card:nth-child(3) .card-tag { background: #eefff8; color: #207060; }
    .card:nth-child(4) .card-tag { background: #f3eeff; color: #7050b0; }

    .card-arrow {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: #f5f0ff;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      font-size: 14px;
      transition: background 0.2s, color 0.2s, transform 0.2s;
    }
    .card:hover .card-arrow {
      background: var(--lavender);
      color: #7050b0;
      transform: rotate(45deg);
    }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding-bottom: 48px;
      color: var(--muted);
      font-size: 13px;
    }
    footer .heart { color: #f0829a; }

    /* Animations */
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.88) translateY(16px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; gap: 24px; }
      header { padding: 48px 20px 32px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="badge">✦ Creative Coding Portfolio</div>
    <h1>나의 <span>p5.js</span> 작품 모음</h1>
    <p class="subtitle">과제 1 · 2 · 3 · 4 를 한 눈에 확인해보세요 🌸</p>
  </header>

  <div class="divider">
    <span class="divider-icon">✿</span>
  </div>

  <main>
    <div class="grid">

      <!-- 과제 1 -->
      <div class="card">
        <div class="card-bar"></div>
        <div class="card-preview">
          <iframe src="sample1/index.html" scrolling="no" title="과제 1"></iframe>
        </div>
        <div class="card-info">
          <div class="card-meta">
            <div class="card-num">1</div>
            <div class="card-text">
              <span class="card-title">과제 1</span>
              <span class="card-tag">정적 Static</span>
            </div>
          </div>
          <div class="card-arrow">↗</div>
        </div>
      </div>

      <!-- 과제 4 -->
      <div class="card">
        <div class="card-bar"></div>
        <div class="card-preview">
          <iframe src="sample4/index.html" scrolling="no" title="과제 4"></iframe>
        </div>
        <div class="card-info">
          <div class="card-meta">
            <div class="card-num">4</div>
            <div class="card-text">
              <span class="card-title">과제 4</span>
              <span class="card-tag">동적 Dynamic</span>
            </div>
          </div>
          <div class="card-arrow">↗</div>
        </div>
      </div>

      <!-- 과제 2 -->
      <div class="card">
        <div class="card-bar"></div>
        <div class="card-preview">
          <iframe src="sample2/index.html" scrolling="no" title="과제 2"></iframe>
        </div>
        <div class="card-info">
          <div class="card-meta">
            <div class="card-num">2</div>
            <div class="card-text">
              <span class="card-title">과제 2</span>
              <span class="card-tag">정적 Static</span>
            </div>
          </div>
          <div class="card-arrow">↗</div>
        </div>
      </div>

      <!-- 과제 3 -->
      <div class="card interactive">
        <div class="card-bar"></div>
        <div class="card-preview">
          <iframe src="sample3/index.html" scrolling="no" title="과제 3"></iframe>
          <div class="interact-hint"><span>🖱️</span> 여기서 바로 조작해보세요!</div>
        </div>
        <div class="card-info">
          <div class="card-meta">
            <div class="card-num">3</div>
            <div class="card-text">
              <span class="card-title">과제 3</span>
              <span class="card-tag">동적 Dynamic</span>
            </div>
          </div>
          <div class="card-arrow">↗</div>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <p>Made with <span class="heart">♥</span> using p5.js</p>
  </footer>

  <script>
    // iframe 배율 자동 계산 (캔버스 기준: 600×400)
    function scaleIframes() {
      document.querySelectorAll('.card-preview').forEach(preview => {
        const iframe = preview.querySelector('iframe');
        if (!iframe) return;
        const scale = preview.offsetWidth / 600;  /* 600px 기준으로만 계산 (높이는 aspect-ratio가 보장) */
        iframe.style.transform = `scale(${scale})`;
        iframe.style.width  = '600px';
        iframe.style.height = '400px';
      });
    }
    scaleIframes();
    window.addEventListener('resize', scaleIframes);

    // 과제3 카드: 호버 시 pointer-events 활성화 (마우스·키보드 인터랙션)
    const interactiveCard = document.querySelector('.card.interactive');
    if (interactiveCard) {
      const iframe = interactiveCard.querySelector('iframe');
      interactiveCard.addEventListener('mouseenter', () => {
        iframe.style.pointerEvents = 'auto';
        iframe.focus();
      });
      interactiveCard.addEventListener('mouseleave', () => {
        iframe.style.pointerEvents = 'none';
      });
    }
  </script>
</body>
</html>
